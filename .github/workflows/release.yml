name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}

  update-homebrew:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-dosu
        uses: actions/checkout@v6
        with:
          repository: dosu-ai/homebrew-dosu
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-dosu

      - name: Update Homebrew formula
        run: |
          cd homebrew-dosu
          ./scripts/update-formula.sh ${GITHUB_REF_NAME#v}

      - name: Commit and push
        run: |
          cd homebrew-dosu
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dosu.rb
          git commit -m "Update dosu to ${{ github.ref_name }}"
          git push

  publish-npm:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" \
            --pattern "dosu_*.tar.gz" \
            --dir dist

      - name: Build and publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./npm/scripts/build-npm.sh "${{ steps.version.outputs.version }}"
