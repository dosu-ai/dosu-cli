name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bunx vitest run

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: bun run scripts/build-all.ts
        env:
          DOSU_VERSION: ${{ steps.version.outputs.version }}
          DOSU_COMMIT: ${{ github.sha }}
          DOSU_DATE: ${{ github.event.head_commit.timestamp }}

      - name: Create archives
        run: |
          cd dist
          for f in dosu-*; do
            if [[ "$f" == *.exe ]]; then
              zip "${f%.exe}.zip" "$f"
            else
              tar czf "${f}.tar.gz" "$f"
            fi
          done
          ls -lh *.tar.gz *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          npm publish --access public

  update-homebrew:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, '-')"
    steps:
      - name: Checkout homebrew-dosu
        uses: actions/checkout@v4
        with:
          repository: dosu-ai/homebrew-dosu
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-dosu

      - name: Update Homebrew formula
        run: |
          cd homebrew-dosu
          ./scripts/update-formula.sh ${GITHUB_REF_NAME#v}

      - name: Commit and push
        run: |
          cd homebrew-dosu
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dosu.rb
          git diff --cached --quiet || git commit -m "Update dosu to ${{ github.ref_name }}"
          git push
