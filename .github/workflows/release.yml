name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bunx tsc --noEmit

      - name: Run tests
        run: bunx vitest run

      - name: Verify cross-platform build matrix
        run: bun run build:all

  windows-npm-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install

      - name: Build npm package
        run: |
          bun run build:npm
          node bin/dosu.js --version
          npm pack

      - name: Smoke test npm exec on Windows
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Filter "dosu-cli-*.tgz" | Select-Object -First 1 -ExpandProperty Name
          npm exec --yes --package "./$pkg" dosu -- --version

  build-release-assets:
    needs:
      - test-and-build
      - windows-npm-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: bun run scripts/build-all.ts
        env:
          DOSU_VERSION: ${{ steps.version.outputs.version }}
          DOSU_COMMIT: ${{ github.sha }}
          DOSU_DATE: ${{ github.run_started_at }}

      - name: Create archives
        run: |
          cd dist
          for f in dosu-*; do
            if [[ "$f" == *.exe ]]; then
              zip "${f%.exe}.zip" "$f"
            else
              tar czf "${f}.tar.gz" "$f"
            fi
          done
          ls -lh *.tar.gz *.zip

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish-npm:
    needs: build-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify npm package
        env:
          DOSU_COMMIT: ${{ github.sha }}
          DOSU_DATE: ${{ github.run_started_at }}
        run: |
          TARGET_VERSION=${{ steps.version.outputs.version }}
          CURRENT_VERSION=$(npm pkg get version | tr -d '"')
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            npm version "$TARGET_VERSION" --no-git-tag-version
          fi
          bun run build:npm
          node bin/dosu.js --version
          npm pack --dry-run

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DOSU_COMMIT: ${{ github.sha }}
          DOSU_DATE: ${{ github.run_started_at }}
        run: |
          TARGET_VERSION=${{ steps.version.outputs.version }}
          CURRENT_VERSION=$(npm pkg get version | tr -d '"')
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            npm version "$TARGET_VERSION" --no-git-tag-version
          fi
          if [[ "$TARGET_VERSION" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi

  create-github-release:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          name: release-archives
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: create-github-release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, '-')"
    steps:
      - name: Checkout homebrew-dosu
        uses: actions/checkout@v4
        with:
          repository: dosu-ai/homebrew-dosu
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-dosu

      - name: Update Homebrew formula
        run: |
          cd homebrew-dosu
          ./scripts/update-formula.sh ${GITHUB_REF_NAME#v}

      - name: Commit and push
        run: |
          cd homebrew-dosu
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dosu.rb
          git diff --cached --quiet || git commit -m "Update dosu to ${{ github.ref_name }}"
          git push
