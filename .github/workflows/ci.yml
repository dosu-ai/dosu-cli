name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bunx tsc --noEmit

      - name: Run tests with coverage
        run: bunx vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Verify build compiles
        run: |
          bun build --compile src/index.ts --outfile bin/dosu
          ./bin/dosu --version
          rm -f bin/dosu

      - name: Verify cross-platform build matrix
        run: bun run build:all

      - name: Verify npm bundle works
        run: |
          bun run build:npm
          node bin/dosu.js --version
          npm pack --dry-run

  windows-npm-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install

      - name: Build npm package
        run: |
          bun run build:npm
          node bin/dosu.js --version
          npm pack

      - name: Smoke test npm exec on Windows
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Filter "dosu-cli-*.tgz" | Select-Object -First 1 -ExpandProperty Name
          npm exec --yes --package "./$pkg" dosu -- --version
