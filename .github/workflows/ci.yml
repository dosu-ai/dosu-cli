name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bunx vitest run

      - name: Verify build compiles
        run: |
          bun build --compile src/index.ts --outfile bin/dosu
          ./bin/dosu --version
          rm -f bin/dosu

      - name: Verify npm bundle works
        run: |
          bun run build:npm
          node bin/dosu.js --version
          npm pack --dry-run
